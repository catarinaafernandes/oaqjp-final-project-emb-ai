name: CI Pipeline

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: 3.9

    - name: Install dependencies
      run: |
        pip install flake8 nose

    - name: Lint with flake8
      run: |
        flake8 .

    - name: Run unit tests
      run: |
        nosetests
``


- name: Lint with flake8
  run: |
    pip install flake8
    flake8 .

- name: Run unit tests
  run: |
    pip install nose
    nosetests
